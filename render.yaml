services:
  - type: web
    name: llm-pv-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/data/lei_evaluation.db
      - key: MOCK_LLM_WHEN_UNCONFIGURED
        value: "true"
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
